name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: native/vanity-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --release

  build:
    name: Build (Windows)
    runs-on: windows-latest
    defaults:
      run:
        working-directory: native/vanity-native
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release
      - uses: actions/upload-artifact@v4
        with:
          name: vanity-native-windows-x64
          path: native/vanity-native/target/release/vanity-native.exe
